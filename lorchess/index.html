<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Human vs LorFish</title>
<style>
  body {
    margin: 0;
    padding: 24px;
    background: #323232;
    color: #fff;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
  }
  .game { display: flex; gap: 24px; }
  .board-wrap { position: relative; }
  .board {
    display: grid;
    grid-template-columns: repeat(8, 80px);
    grid-template-rows: repeat(8, 80px);
    border: 2px solid #1a1a1a;
    user-select: none;
  }
  .square {
    width: 80px; height: 80px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .square.light { background: #f0d9b5; }
  .square.dark  { background: #b58863; }
  .square.last-move { background: #bacaa4 !important; }
  .square.selected  { background: #f6f682 !important; }
  .square.check {
    background: #eb6150 !important;
    box-shadow: inset 0 0 0 5px #dc3232, inset 0 0 0 7px #ff9696;
  }
  .square img {
    width: 60px; height: 60px;
    pointer-events: none;
  }
  .square img.pawn { width: 48px; }
  .hint {
    position: absolute;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: rgba(100,100,100,0.55);
    pointer-events: none;
  }
  .hint.capture {
    width: 64px; height: 64px;
    background: transparent;
    border: 5px solid rgba(200,50,50,0.7);
    box-sizing: border-box;
  }
  .coord {
    position: absolute;
    font-size: 12px;
    pointer-events: none;
    font-weight: bold;
  }
  .coord.file { right: 4px; bottom: 2px; }
  .coord.rank { left: 4px; top: 2px; }

  .info { width: 280px; }
  .info h2 { margin: 0 0 12px; }
  .info h3 { margin: 16px 0 6px; }
  .info p { margin: 6px 0; }
  #history {
    background: #1e1e1e;
    padding: 10px;
    height: 240px;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.5;
    border-radius: 4px;
    font-family: monospace;
  }
  button {
    background: #555; color: #fff; border: 0;
    padding: 8px 14px; margin: 4px 6px 4px 0;
    cursor: pointer; border-radius: 4px;
  }
  button:hover { background: #777; }
  select {
    background: #444; color: #fff;
    border: 1px solid #666; padding: 4px;
  }
  .promo {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
  }
  .promo.show { display: flex; }
  .promo-box {
    background: #3c3c3c;
    border: 2px solid #c8c8c8;
    padding: 16px;
    border-radius: 6px;
  }
  .promo-box .options { display: flex; gap: 10px; margin-top: 10px; }
  .promo-box .opt {
    width: 60px; height: 60px;
    border: 2px solid #969696;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    background: #2a2a2a;
  }
  .promo-box .opt:hover { background: #555; }
  .promo-box .opt img { width: 50px; height: 50px; }
  .thinking { color: #ffc864; }
  .check-text { color: #ff6464; }
  .game-over { color: #ff6464; }
</style>
</head>
<body>
<div class="game">
  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="promo" id="promo">
      <div class="promo-box">
        <div>Choose Promotion:</div>
        <div class="options" id="promoOptions"></div>
      </div>
    </div>
  </div>
  <div class="info">
    <h2>Chess Game</h2>
    <p>White: Human</p>
    <p>Black: LorFish</p>
    <p>Depth:
      <select id="depth">
        <option value="2" selected>2 (~1400)</option>
        <option value="3">3</option>
        <option value="4">4 (~1800, slow)</option>
      </select>
    </p>
    <p id="turn">Turn: White</p>
    <p id="status"></p>
    <h3>Move History</h3>
    <div id="history"></div>
    <p style="margin-top:12px;">
      <button id="undoBtn">Undo (R)</button>
      <button id="resetBtn">New Game</button>
    </p>
    <p style="color:#969696; font-size:12px;">Click a piece, then click a destination.</p>
  </div>
</div>

<script>
"use strict";

// ====================================================================
// Chess rules engine
// ====================================================================
const W = 'w', B = 'b';
const sqIdx = (f, r) => r * 8 + f;
const fileOf = sq => sq & 7;
const rankOf = sq => sq >> 3;
const algOf = sq => String.fromCharCode(97 + fileOf(sq)) + (rankOf(sq) + 1);
const opp = c => c === W ? B : W;
const inBoard = (f, r) => f >= 0 && f < 8 && r >= 0 && r < 8;
const PIECE_NAMES = { p:'pawn', n:'knight', b:'bishop', r:'rook', q:'queen', k:'king' };

class Chess {
  constructor() { this.reset(); }

  reset() {
    this.squares = new Array(64).fill(null);
    const back = ['r','n','b','q','k','b','n','r'];
    for (let f = 0; f < 8; f++) {
      this.squares[sqIdx(f,0)] = { t: back[f], c: W };
      this.squares[sqIdx(f,1)] = { t: 'p',     c: W };
      this.squares[sqIdx(f,6)] = { t: 'p',     c: B };
      this.squares[sqIdx(f,7)] = { t: back[f], c: B };
    }
    this.turn = W;
    this.castling = { K: true, Q: true, k: true, q: true };
    this.ep = null;
    this.halfmove = 0;
    this.fullmove = 1;
    this.history = [];
  }

  pseudoMovesFrom(sq, c) {
    const piece = this.squares[sq];
    if (!piece || piece.c !== c) return [];
    const moves = [];
    const f = fileOf(sq), r = rankOf(sq);
    const them = opp(c);
    const add = (to, opts) => moves.push(Object.assign({ from: sq, to }, opts || {}));

    if (piece.t === 'p') {
      const dir = c === W ? 1 : -1;
      const startRank = c === W ? 1 : 6;
      const promoRank = c === W ? 7 : 0;
      // forward 1
      if (inBoard(f, r + dir) && !this.squares[sqIdx(f, r + dir)]) {
        const to = sqIdx(f, r + dir);
        if (rankOf(to) === promoRank) {
          for (const p of ['q','r','b','n']) add(to, { promo: p });
        } else {
          add(to);
          if (r === startRank && !this.squares[sqIdx(f, r + 2*dir)]) {
            add(sqIdx(f, r + 2*dir), { ep_set: sqIdx(f, r + dir) });
          }
        }
      }
      // captures
      for (const df of [-1, 1]) {
        const nf = f + df, nr = r + dir;
        if (!inBoard(nf, nr)) continue;
        const to = sqIdx(nf, nr);
        const tgt = this.squares[to];
        if (tgt && tgt.c === them) {
          if (rankOf(to) === promoRank) {
            for (const p of ['q','r','b','n']) add(to, { promo: p, capture: true });
          } else {
            add(to, { capture: true });
          }
        } else if (this.ep === to && !tgt) {
          add(to, { capture: true, enpassant: true });
        }
      }
    } else if (piece.t === 'n') {
      const offs = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
      for (const [df, dr] of offs) {
        const nf = f + df, nr = r + dr;
        if (!inBoard(nf, nr)) continue;
        const to = sqIdx(nf, nr);
        const tgt = this.squares[to];
        if (!tgt) add(to);
        else if (tgt.c === them) add(to, { capture: true });
      }
    } else if (piece.t === 'b' || piece.t === 'r' || piece.t === 'q') {
      const dirs = [];
      if (piece.t !== 'r') dirs.push([-1,-1],[-1,1],[1,-1],[1,1]);
      if (piece.t !== 'b') dirs.push([-1,0],[1,0],[0,-1],[0,1]);
      for (const [df, dr] of dirs) {
        let nf = f + df, nr = r + dr;
        while (inBoard(nf, nr)) {
          const to = sqIdx(nf, nr);
          const tgt = this.squares[to];
          if (!tgt) add(to);
          else { if (tgt.c === them) add(to, { capture: true }); break; }
          nf += df; nr += dr;
        }
      }
    } else if (piece.t === 'k') {
      for (let df = -1; df <= 1; df++) for (let dr = -1; dr <= 1; dr++) {
        if (!df && !dr) continue;
        const nf = f + df, nr = r + dr;
        if (!inBoard(nf, nr)) continue;
        const to = sqIdx(nf, nr);
        const tgt = this.squares[to];
        if (!tgt) add(to);
        else if (tgt.c === them) add(to, { capture: true });
      }
      // castling (path-empty + rook check; check/attack tested in legalMoves)
      const home = c === W ? 0 : 7;
      const KK = c === W ? 'K' : 'k';
      const QQ = c === W ? 'Q' : 'q';
      if (r === home && f === 4) {
        const rookK = this.squares[sqIdx(7, home)];
        if (this.castling[KK]
            && !this.squares[sqIdx(5, home)]
            && !this.squares[sqIdx(6, home)]
            && rookK && rookK.t === 'r' && rookK.c === c) {
          add(sqIdx(6, home), { castle: 'K' });
        }
        const rookQ = this.squares[sqIdx(0, home)];
        if (this.castling[QQ]
            && !this.squares[sqIdx(1, home)]
            && !this.squares[sqIdx(2, home)]
            && !this.squares[sqIdx(3, home)]
            && rookQ && rookQ.t === 'r' && rookQ.c === c) {
          add(sqIdx(2, home), { castle: 'Q' });
        }
      }
    }
    return moves;
  }

  isAttacked(sq, byColor) {
    const f = fileOf(sq), r = rankOf(sq);
    // pawn (attacker of byColor moves toward us; their pawn at r-dir attacks us)
    const dir = byColor === W ? -1 : 1;
    for (const df of [-1, 1]) {
      const nf = f + df, nr = r + dir;
      if (!inBoard(nf, nr)) continue;
      const p = this.squares[sqIdx(nf, nr)];
      if (p && p.c === byColor && p.t === 'p') return true;
    }
    // knight
    const knightOffs = [[-2,-1],[-2,1],[-1,-2],[-1,2],[1,-2],[1,2],[2,-1],[2,1]];
    for (const [df, dr] of knightOffs) {
      const nf = f + df, nr = r + dr;
      if (!inBoard(nf, nr)) continue;
      const p = this.squares[sqIdx(nf, nr)];
      if (p && p.c === byColor && p.t === 'n') return true;
    }
    // sliders
    const diag = [[-1,-1],[-1,1],[1,-1],[1,1]];
    const ortho = [[-1,0],[1,0],[0,-1],[0,1]];
    for (const [df, dr] of diag) {
      let nf = f + df, nr = r + dr;
      while (inBoard(nf, nr)) {
        const p = this.squares[sqIdx(nf, nr)];
        if (p) {
          if (p.c === byColor && (p.t === 'b' || p.t === 'q')) return true;
          break;
        }
        nf += df; nr += dr;
      }
    }
    for (const [df, dr] of ortho) {
      let nf = f + df, nr = r + dr;
      while (inBoard(nf, nr)) {
        const p = this.squares[sqIdx(nf, nr)];
        if (p) {
          if (p.c === byColor && (p.t === 'r' || p.t === 'q')) return true;
          break;
        }
        nf += df; nr += dr;
      }
    }
    // king
    for (let df = -1; df <= 1; df++) for (let dr = -1; dr <= 1; dr++) {
      if (!df && !dr) continue;
      const nf = f + df, nr = r + dr;
      if (!inBoard(nf, nr)) continue;
      const p = this.squares[sqIdx(nf, nr)];
      if (p && p.c === byColor && p.t === 'k') return true;
    }
    return false;
  }

  findKing(c) {
    for (let i = 0; i < 64; i++) {
      const p = this.squares[i];
      if (p && p.c === c && p.t === 'k') return i;
    }
    return -1;
  }

  inCheck(c) {
    if (c === undefined) c = this.turn;
    return this.isAttacked(this.findKing(c), opp(c));
  }

  legalMoves(forColor) {
    const c = forColor || this.turn;
    const moves = [];
    for (let sq = 0; sq < 64; sq++) {
      const p = this.squares[sq];
      if (!p || p.c !== c) continue;
      for (const m of this.pseudoMovesFrom(sq, c)) {
        if (m.castle) {
          // Can't castle out of check, through check, or into check.
          if (this.inCheck(c)) continue;
          const home = c === W ? 0 : 7;
          const passSq = m.castle === 'K' ? sqIdx(5, home) : sqIdx(3, home);
          if (this.isAttacked(passSq, opp(c))) continue;
        }
        this.makeMove(m);
        if (!this.isAttacked(this.findKing(c), opp(c))) moves.push(m);
        this.undoMove();
      }
    }
    return moves;
  }

  makeMove(m) {
    const piece = this.squares[m.from];
    const captured = m.enpassant
      ? this.squares[sqIdx(fileOf(m.to), rankOf(m.from))]
      : this.squares[m.to];

    this.history.push({
      move: m,
      captured,
      castling: { K: this.castling.K, Q: this.castling.Q, k: this.castling.k, q: this.castling.q },
      ep: this.ep,
      halfmove: this.halfmove,
      fullmove: this.fullmove,
      turn: this.turn,
    });

    this.squares[m.from] = null;
    this.squares[m.to] = m.promo ? { t: m.promo, c: piece.c } : piece;

    if (m.enpassant) {
      this.squares[sqIdx(fileOf(m.to), rankOf(m.from))] = null;
    }

    if (m.castle === 'K') {
      const r = rankOf(m.from);
      this.squares[sqIdx(5, r)] = this.squares[sqIdx(7, r)];
      this.squares[sqIdx(7, r)] = null;
    } else if (m.castle === 'Q') {
      const r = rankOf(m.from);
      this.squares[sqIdx(3, r)] = this.squares[sqIdx(0, r)];
      this.squares[sqIdx(0, r)] = null;
    }

    // Castling rights updates
    if (piece.t === 'k') {
      if (piece.c === W) { this.castling.K = false; this.castling.Q = false; }
      else { this.castling.k = false; this.castling.q = false; }
    }
    if (m.from === sqIdx(0,0) || m.to === sqIdx(0,0)) this.castling.Q = false;
    if (m.from === sqIdx(7,0) || m.to === sqIdx(7,0)) this.castling.K = false;
    if (m.from === sqIdx(0,7) || m.to === sqIdx(0,7)) this.castling.q = false;
    if (m.from === sqIdx(7,7) || m.to === sqIdx(7,7)) this.castling.k = false;

    this.ep = (m.ep_set != null) ? m.ep_set : null;

    if (piece.t === 'p' || captured) this.halfmove = 0;
    else this.halfmove++;

    if (this.turn === B) this.fullmove++;
    this.turn = opp(this.turn);
  }

  undoMove() {
    if (this.history.length === 0) return;
    const h = this.history.pop();
    const m = h.move;

    this.castling = h.castling;
    this.ep = h.ep;
    this.halfmove = h.halfmove;
    this.fullmove = h.fullmove;
    this.turn = h.turn;

    const movedPiece = this.squares[m.to];
    this.squares[m.from] = m.promo ? { t: 'p', c: movedPiece.c } : movedPiece;

    if (m.enpassant) {
      this.squares[m.to] = null;
      this.squares[sqIdx(fileOf(m.to), rankOf(m.from))] = h.captured;
    } else {
      this.squares[m.to] = h.captured;
    }

    if (m.castle === 'K') {
      const r = rankOf(m.from);
      this.squares[sqIdx(7, r)] = this.squares[sqIdx(5, r)];
      this.squares[sqIdx(5, r)] = null;
    } else if (m.castle === 'Q') {
      const r = rankOf(m.from);
      this.squares[sqIdx(0, r)] = this.squares[sqIdx(3, r)];
      this.squares[sqIdx(3, r)] = null;
    }
  }

  isInsufficientMaterial() {
    const ps = [];
    for (let i = 0; i < 64; i++) {
      const p = this.squares[i];
      if (p) ps.push({ t: p.t, c: p.c, sq: i });
    }
    if (ps.length === 2) return true;
    if (ps.length === 3) {
      const nk = ps.find(p => p.t !== 'k');
      if (nk && (nk.t === 'b' || nk.t === 'n')) return true;
    }
    if (ps.length === 4) {
      const bs = ps.filter(p => p.t === 'b');
      if (bs.length === 2 && ps.filter(p => p.t === 'k').length === 2) {
        const c0 = (fileOf(bs[0].sq) + rankOf(bs[0].sq)) & 1;
        const c1 = (fileOf(bs[1].sq) + rankOf(bs[1].sq)) & 1;
        if (c0 === c1) return true;
      }
    }
    return false;
  }

  isCheckmate() { return this.inCheck() && this.legalMoves().length === 0; }
  isStalemate() { return !this.inCheck() && this.legalMoves().length === 0; }
  isGameOver() {
    return this.legalMoves().length === 0 || this.isInsufficientMaterial() || this.halfmove >= 100;
  }
  result() {
    if (this.isCheckmate()) return this.turn === W ? '0-1' : '1-0';
    if (this.legalMoves().length === 0 || this.isInsufficientMaterial() || this.halfmove >= 100) return '1/2-1/2';
    return '*';
  }

  // SAN — call BEFORE making the move
  moveToSan(m) {
    const piece = this.squares[m.from];
    let san;
    if (m.castle === 'K') san = 'O-O';
    else if (m.castle === 'Q') san = 'O-O-O';
    else {
      const isCap = !!(m.capture || m.enpassant);
      if (piece.t === 'p') {
        san = '';
        if (isCap) san += String.fromCharCode(97 + fileOf(m.from)) + 'x';
        san += algOf(m.to);
        if (m.promo) san += '=' + m.promo.toUpperCase();
      } else {
        san = piece.t.toUpperCase();
        const cands = this.legalMoves(piece.c).filter(om =>
          om.to === m.to && om.from !== m.from &&
          this.squares[om.from] && this.squares[om.from].t === piece.t
        );
        if (cands.length > 0) {
          const sameFile = cands.some(c => fileOf(c.from) === fileOf(m.from));
          const sameRank = cands.some(c => rankOf(c.from) === rankOf(m.from));
          if (!sameFile)      san += String.fromCharCode(97 + fileOf(m.from));
          else if (!sameRank) san += String(rankOf(m.from) + 1);
          else                san += algOf(m.from);
        }
        if (isCap) san += 'x';
        san += algOf(m.to);
      }
    }
    this.makeMove(m);
    if (this.inCheck()) san += this.legalMoves().length === 0 ? '#' : '+';
    this.undoMove();
    return san;
  }
}

// ====================================================================
// LorFish engine — port of lorfish.py
// ====================================================================

       -4,   3, -14, -50, -57, -18,  13,   4,
      -47, -42, -43, -79, -64, -32, -29, -32,
      -55, -43, -52, -28, -51, -47,  -8, -50,
      -55,  50,  11,  -4, -19,  13,   0, -49,
      -62,  12, -57,  44, -67,  28,  37, -31,
      -32,  10,  55,  56,  56,  55,  10,   3,
        4,  54,  47, -99, -99,  60,  83, -62
    ],
  },

  orderMoves(chess, moves) {
    // MVV-LVA + promotion bonus. Skipping gives_check bonus for performance.
    const scored = new Array(moves.length);
    for (let i = 0; i < moves.length; i++) {
      const m = moves[i];
      let s = 0;
      const victim = m.enpassant ? { t: 'p' } : chess.squares[m.to];
      const attacker = chess.squares[m.from];
      if (victim && attacker) {
        s += (this.pieceValues[victim.t] || 0) * 10;
        s -= (this.pieceValues[attacker.t] || 0) / 100 | 0;
      }
      if (m.promo) s += 8000;
      scored[i] = { m, s };
    }
    scored.sort((a, b) => b.s - a.s);
    return scored.map(x => x.m);
  },

  evaluate(chess) {
    let score = 0;
    for (let sq = 0; sq < 64; sq++) {
      const p = chess.squares[sq];
      if (!p) continue;
      const idx = p.c === W ? sq : (sq ^ 56);
      const v = this.pieceValues[p.t] + this.pst[p.t][idx];
      score += p.c === W ? v : -v;
    }
    return chess.turn === W ? score : -score;
  },

  quiescence(chess, alpha, beta, qdepth) {
    this.nodes++;
    if (qdepth > this.maxQ) this.maxQ = qdepth;

    const moves = chess.legalMoves();
    if (moves.length === 0) return chess.inCheck() ? -99999 : 0;
    if (chess.isInsufficientMaterial()) return 0;

    const standPat = this.evaluate(chess);
    if (standPat >= beta) return beta;
    if (standPat > alpha) alpha = standPat;

    const captures = this.orderMoves(chess, moves.filter(m => m.capture || m.enpassant));
    for (const m of captures) {
      chess.makeMove(m);
      const score = -this.quiescence(chess, -beta, -alpha, qdepth + 1);
      chess.undoMove();
      if (score >= beta) return beta;
      if (score > alpha) alpha = score;
    }
    return alpha;
  },

  negamax(chess, depth, alpha, beta) {
    this.nodes++;
    const moves = chess.legalMoves();
    if (moves.length === 0) return chess.inCheck() ? (-99999 - depth) : 0;
    if (chess.isInsufficientMaterial()) return 0;
    if (depth === 0) return this.quiescence(chess, alpha, beta, 0);

    const ordered = this.orderMoves(chess, moves);
    let best = -Infinity;
    for (const m of ordered) {
      chess.makeMove(m);
      const v = -this.negamax(chess, depth - 1, -beta, -alpha);
      chess.undoMove();
      if (v > best) best = v;
      if (best > alpha) alpha = best;
      if (alpha >= beta) break;
    }
    return best;
  },

  getBestMove(chess, depth) {
    this.nodes = 0;
    this.maxQ = 0;
    const t0 = performance.now();
    let bestMove = null, bestVal = -Infinity;
    let alpha = -Infinity, beta = Infinity;
    const moves = this.orderMoves(chess, chess.legalMoves());
    for (const m of moves) {
      chess.makeMove(m);
      const v = -this.negamax(chess, depth - 1, -beta, -alpha);
      chess.undoMove();
      if (v > bestVal) { bestVal = v; bestMove = m; }
      if (v > alpha) alpha = v;
    }
    const dt = ((performance.now() - t0) / 1000).toFixed(3);
    console.log(`nodes=${this.nodes} time=${dt}s maxQ=${this.maxQ}`);
    return bestMove;
  },
};

// ====================================================================
// UI
// ====================================================================
const chess = new Chess();
let selected = null;
let legalFromSelected = [];
let lastMove = null;
let promotionPending = null;
let thinking = false;
let moveHistory = [];

const boardEl   = document.getElementById('board');
const turnEl    = document.getElementById('turn');
const statusEl  = document.getElementById('status');
const historyEl = document.getElementById('history');
const promoEl   = document.getElementById('promo');
const promoOpts = document.getElementById('promoOptions');

function pieceImgSrc(piece) {
  return `assets/${piece.c}_${PIECE_NAMES[piece.t]}_1x_ns.png`;
}

function render() {
  boardEl.innerHTML = '';
  const inCheckNow = chess.inCheck();
  for (let r = 7; r >= 0; r--) {
    for (let f = 0; f < 8; f++) {
      const sq = sqIdx(f, r);
      const div = document.createElement('div');
      div.className = 'square ' + ((r + f) % 2 === 0 ? 'dark' : 'light');
      div.dataset.sq = sq;

      if (lastMove && (lastMove.from === sq || lastMove.to === sq)) div.classList.add('last-move');
      if (selected === sq) div.classList.add('selected');

      const piece = chess.squares[sq];
      if (inCheckNow && piece && piece.t === 'k' && piece.c === chess.turn) {
        div.classList.add('check');
      }

      // Coordinates: ranks on file a, files on rank 1
      if (f === 0) {
        const c = document.createElement('div');
        c.className = 'coord rank';
        c.textContent = r + 1;
        c.style.color = ((r + f) % 2 === 0) ? '#b58863' : '#f0d9b5';
        div.appendChild(c);
      }
      if (r === 0) {
        const c = document.createElement('div');
        c.className = 'coord file';
        c.textContent = String.fromCharCode(97 + f);
        c.style.color = ((r + f) % 2 === 0) ? '#b58863' : '#f0d9b5';
        div.appendChild(c);
      }

      if (piece) {
        const img = document.createElement('img');
        img.src = pieceImgSrc(piece);
        if (piece.t === 'p') img.classList.add('pawn');
        img.draggable = false;
        img.alt = piece.c + piece.t;
        div.appendChild(img);
      }

      if (selected !== null) {
        const m = legalFromSelected.find(x => x.to === sq);
        if (m) {
          const hint = document.createElement('div');
          hint.className = 'hint';
          if (chess.squares[sq] || m.enpassant) hint.classList.add('capture');
          div.appendChild(hint);
        }
      }

      div.addEventListener('click', () => onSquareClick(sq));
      boardEl.appendChild(div);
    }
  }

  // Info panel
  if (chess.isGameOver() && !thinking) {
    turnEl.textContent = '';
    turnEl.className = '';
  } else if (thinking) {
    turnEl.textContent = 'Engine thinking...';
    turnEl.className = 'thinking';
  } else {
    turnEl.textContent = 'Turn: ' + (chess.turn === W ? 'White' : 'Black');
    turnEl.className = '';
  }

  if (chess.isGameOver()) {
    let s = `Game Over: ${chess.result()}`;
    if (chess.isCheckmate()) {
      s += ` — ${chess.turn === W ? 'Black' : 'White'} wins!`;
    } else if (chess.isStalemate()) {
      s += ' — Stalemate';
    } else if (chess.isInsufficientMaterial()) {
      s += ' — Insufficient material';
    } else if (chess.halfmove >= 100) {
      s += ' — 50-move rule';
    }
    statusEl.textContent = s;
    statusEl.className = 'game-over';
  } else if (inCheckNow) {
    statusEl.textContent = 'Check!';
    statusEl.className = 'check-text';
  } else {
    statusEl.textContent = '';
    statusEl.className = '';
  }

  historyEl.innerHTML = moveHistory.join('<br>');
  historyEl.scrollTop = historyEl.scrollHeight;
}

function onSquareClick(sq) {
  if (promotionPending || thinking || chess.isGameOver()) return;
  if (chess.turn !== W) return;

  if (selected === null) {
    const piece = chess.squares[sq];
    if (piece && piece.c === W) {
      selected = sq;
      legalFromSelected = chess.legalMoves().filter(m => m.from === sq);
      render();
    }
    return;
  }

  const candidate = legalFromSelected.find(m => m.to === sq);
  if (candidate) {
    const piece = chess.squares[selected];
    if (piece.t === 'p' && (rankOf(sq) === 0 || rankOf(sq) === 7)) {
      promotionPending = { from: selected, to: sq };
      showPromotionDialog();
      return;
    }
    doHumanMove(candidate);
    return;
  }

  // Reselect or deselect
  const piece = chess.squares[sq];
  if (piece && piece.c === W) {
    selected = sq;
    legalFromSelected = chess.legalMoves().filter(m => m.from === sq);
  } else {
    selected = null;
    legalFromSelected = [];
  }
  render();
}

function doHumanMove(move) {
  const moveNum = chess.fullmove;
  const san = chess.moveToSan(move);
  chess.makeMove(move);
  lastMove = move;
  moveHistory.push(`${moveNum}. ${san}`);
  selected = null;
  legalFromSelected = [];
  render();

  if (!chess.isGameOver()) {
    setTimeout(makeEngineMove, 50);
  }
}

function makeEngineMove() {
  if (chess.isGameOver() || chess.turn !== B) return;
  thinking = true;
  render();
  // Defer to next tick so the "thinking" UI paints before we block.
  setTimeout(() => {
    const depth = parseInt(document.getElementById('depth').value, 10);
    const move = LorFish.getBestMove(chess, depth);
    if (move) {
      const moveNum = chess.fullmove;
      const san = chess.moveToSan(move);
      chess.makeMove(move);
      lastMove = move;
      moveHistory.push(`${moveNum}... ${san}`);
    }
    thinking = false;
    render();
  }, 30);
}

function showPromotionDialog() {
  promoOpts.innerHTML = '';
  for (const t of ['q','r','b','n']) {
    const opt = document.createElement('div');
    opt.className = 'opt';
    const img = document.createElement('img');
    img.src = `assets/w_${PIECE_NAMES[t]}_1x_ns.png`;
    opt.appendChild(img);
    opt.addEventListener('click', () => {
      const move = legalFromSelected.find(m => m.to === promotionPending.to && m.promo === t);
      promoEl.classList.remove('show');
      promotionPending = null;
      if (move) doHumanMove(move);
    });
    promoOpts.appendChild(opt);
  }
  promoEl.classList.add('show');
}

function undo() {
  if (thinking) return;
  promotionPending = null;
  promoEl.classList.remove('show');

  // After a normal turn it's white to move; pop two plies (engine + human).
  if (chess.turn === W && chess.history.length >= 2) {
    chess.undoMove();
    chess.undoMove();
    moveHistory.splice(-2);
  } else if (chess.turn === B && chess.history.length >= 1) {
    chess.undoMove();
    moveHistory.splice(-1);
  }
  lastMove = chess.history.length > 0
    ? chess.history[chess.history.length - 1].move
    : null;
  selected = null;
  legalFromSelected = [];
  render();
}

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') undo();
});
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('resetBtn').addEventListener('click', () => {
  chess.reset();
  moveHistory = [];
  lastMove = null;
  selected = null;
  legalFromSelected = [];
  promotionPending = null;
  promoEl.classList.remove('show');
  thinking = false;
  render();
});

render();
</script>
